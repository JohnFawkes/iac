---
# yaml-language-server: $schema=https://schemas.mafyuh.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: oke-apps
  namespace: flux-system
spec:
  interval: 10m
  timeout: 10m
  # Add the small set of OCI-specific app Kustomizations here as they are needed.
  # Shared apps remain under kubernetes/apps.
  path: ./kubernetes/oke/apps
  sourceRef:
    kind: GitRepository
    name: iac
  prune: true
  wait: false
  decryption:
    provider: sops
    secretRef:
      name: sops-age
