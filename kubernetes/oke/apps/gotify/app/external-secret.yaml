---
# yaml-language-server: $schema=https://schemas.mafyuh.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gotify-secrets
spec:
  refreshInterval: 3h
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: gotify-secrets
  data:
    - secretKey: username
      remoteRef:
        key: "5934d022-ee32-4aff-810b-b258001c9638"
    - secretKey: password
      remoteRef:
        key: "bf7c1717-d602-4401-96b8-b258001cd484"
    - secretKey: GOTIFY_DOMAIN
      remoteRef:
        key: "58f9da83-7fff-4d04-b733-b461003c8ec5"
