---
# yaml-language-server: $schema=https://schemas.mafyuh.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app vaultwarden
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    global:
      fullnameOverride: *app
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: &group 1000
        fsGroup: *group
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      vaultwarden:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/dani-garcia/vaultwarden
              tag: 1.36.0
            env:
              TZ: America/New_York
              DOMAIN: https://${SECRET_DOMAIN}
              ROCKET_PORT: &port 8080
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: oke-cluster-pguser-vaultwarden
                    key: uri
              SIGNUPS_ALLOWED: "true"
              SSO_ENABLED: "true"
              SSO_AUTHORITY: https://auth.mafyuh.io/application/o/vaultwarden/
              SSO_SCOPES: openid email profile offline_access
              SSO_ONLY: "true"
              SSO_AUTH_ONLY_NOT_SESSION: "true"
              SSO_CLIENT_ID: e17019c548f26f15e483b74b2b0a95e8900a03bb
              SMTP_HOST: smtp.protonmail.ch
              SMTP_FROM: noreply@mafyuh.dev
              SMTP_FROM_NAME: Vaultwarden
              SMTP_USERNAME: noreply@mafyuh.dev
              SMTP_TIMEOUT: "15"
              SMTP_SECURITY: starttls
              SMTP_PORT: "587"
            envFrom:
              - secretRef:
                  name: vaultwarden-secrets
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /alive
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: [ALL]
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi
    service:
      app:
        controller: vaultwarden
        ports:
          http:
            port: *port
    route:
      public:
        enabled: true
        kind: HTTPRoute
        hostnames: ["${SECRET_DOMAIN}"]
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - name: vaultwarden
                port: *port
        parentRefs:
          - name: envoy-external
            namespace: networking
            sectionName: https
    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        storageClass: oci-bv
        accessMode: ReadWriteOnce
        size: 1Gi
        retain: true
        globalMounts:
          - path: /data
