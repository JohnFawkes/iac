---
# yaml-language-server: $schema=https://schemas.mafyuh.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vaultwarden-secrets
spec:
  refreshInterval: 3h
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: vaultwarden-secrets
    template:
      engineVersion: v2
      data:
        SSO_CLIENT_SECRET: "{{ .sso_client_secret }}"
        SMTP_PASSWORD: "{{ .smtp_password }}"
        SECRET_DOMAIN: "{{ .secret_domain }}"
  data:
    - secretKey: sso_client_secret
      remoteRef:
        key: "8f987b8a-38f0-41f8-99ce-b3c100236514"
    - secretKey: smtp_password
      remoteRef:
        key: "801517e8-db9b-4c74-8307-b3c1002325fe"
    - secretKey: secret_domain
      remoteRef:
        key: "d5a92893-2105-424b-820d-b461003cf4db"
