---
# yaml-language-server: $schema=https://schemas.mafyuh.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name oke-cluster-crunchy-postgres
spec:
  refreshInterval: 3h
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: *name
    template:
      data:
        PG_ADMIN_PASSWORD: "{{ .PG_ADMIN_PASSWORD }}"
        s3.conf: |
          [global]
          repo1-s3-key=K3Bf56zgJk4DqMQnIV2m
          repo1-s3-key-secret={{ .PG_MINIO_SECRET_KEY }}
  data:
    - secretKey: PG_MINIO_SECRET_KEY
      remoteRef:
        key: "444d8094-5d11-4b3b-92a7-b371017e2269"
    - secretKey: PG_ADMIN_PASSWORD
      remoteRef:
        key: "86f62c21-8919-48cb-ab91-b3100173e3cf"
