---
# yaml-language-server: $schema=https://schemas.mafyuh.dev/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: matt-fo-wildcard
  namespace: cert-manager
spec:
  secretName: matt-fo-production-tls
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: "*.matt.fo"
  dnsNames:
    - "*.matt.fo"
    - "matt.fo"
